<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Practifa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <a href="index.html" class="logo">🚀 Practifa</a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <!-- Login -->
    <section class="login-section">
        <div class="login-container">
            <h2>Iniciar Sesión</h2>
            <p>Accede a tu cuenta para continuar.</p>

            <form>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="********" required>
                </div>

                <button type="submit" class="cta-button">Ingresar</button>
            </form>

            <div class="login-links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <p>¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p> 2026 Practifa. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
